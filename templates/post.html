<article id="post">
  <h1 class="post-heading">{{ title }}</h1>
  <div class="post-meta">
    <span class="post-description">
      {{ description }}
    </span>
    <br />
    <span class="post-date">
      <strong>{{ published }}</strong>
    </span>
  </div>
  {{ content|indent(0, False) }}
</article>
